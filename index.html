<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:monospace;
}

.widget{
width:140px;
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
padding:14px;
border:4px solid black;
box-shadow:4px 4px 0 black;
}

/* 고양이 영역 */

.catArea{
width:100%;
height:90px;
display:flex;
justify-content:center;
align-items:center;
}

.pixel-art{
width:6px;
height:6px;
transform:scale(.7);
background:transparent;

box-shadow:
30px 6px #000,
36px 6px #000,
42px 6px #000,
48px 6px #000,
54px 6px #000,
60px 12px #000,
18px 18px #000,
48px 18px #000,
66px 18px #000,
12px 24px #000,
18px 24px #000,
42px 24px #000,
48px 24px #000,
66px 24px #000,
6px 30px #000,
18px 30px #000,
24px 30px #000,
30px 30px #000,
36px 30px #000,
48px 30px #000,
72px 30px #000,
6px 36px #000,
72px 36px #000,
0px 42px #000,
72px 42px #000,
0px 48px #000,
18px 48px #000,
36px 48px #000,
72px 48px #000,
0px 54px #000,
66px 54px #000,
6px 60px #000,
54px 60px #000,
60px 60px #000,
12px 66px #000,
18px 66px #000,
24px 66px #000,
30px 66px #000,
36px 66px #000,
42px 66px #000,
48px 66px #000;
}

/* 점프 */

.jump{
animation:jump .4s infinite alternate;
}

@keyframes jump{

from{
transform:scale(.7) translateY(0);
}

to{
transform:scale(.7) translateY(-12px);
}

}

/* 눕기 */

.sleep{
transform:scale(.7) rotate(90deg);
}

/* 타이머 */

.timer{
font-size:18px;
}

/* 버튼 */

.buttons{
display:flex;
gap:6px;
}

button{
border:3px solid black;
background:white;
padding:4px 8px;
box-shadow:3px 3px 0 black;
cursor:pointer;
}

button:active{
transform:translate(2px,2px);
box-shadow:1px 1px 0 black;
}

</style>
</head>

<body>

<div class="widget">

<div class="catArea">
<div id="cat" class="pixel-art"></div>
</div>

<div class="timer" id="timer">25:00</div>

<div class="buttons">
<button id="toggle">START</button>
<button id="stop">STOP</button>
</div>

</div>

<script>

const TOTAL=1500

let time=TOTAL
let running=false
let interval
let animLoop

const cat=document.getElementById("cat")
const toggle=document.getElementById("toggle")
const stop=document.getElementById("stop")
const timer=document.getElementById("timer")

function draw(){

const m=String(Math.floor(time/60)).padStart(2,"0")
const s=String(time%60).padStart(2,"0")

timer.innerText=`${m}:${s}`

}

/* 애니메이션 루프 */

function animationCycle(){

cat.classList.remove("sleep")
cat.classList.add("jump")

setTimeout(()=>{

cat.classList.remove("jump")
cat.classList.add("sleep")

},2000)

animLoop=setTimeout(animationCycle,4000)

}

/* START / PAUSE / RESUME */

toggle.onclick=()=>{

if(!running){

running=true
toggle.innerText="PAUSE"

interval=setInterval(()=>{

time--
draw()

if(time<=0){

clearInterval(interval)
clearTimeout(animLoop)

running=false
toggle.innerText="START"

}

},1000)

animationCycle()

}else{

running=false
toggle.innerText="RESUME"

clearInterval(interval)
clearTimeout(animLoop)

cat.classList.remove("jump")

}

}

/* STOP (완전 리셋) */

stop.onclick=()=>{

running=false

clearInterval(interval)
clearTimeout(animLoop)

time=TOTAL

toggle.innerText="START"

cat.classList.remove("jump")
cat.classList.remove("sleep")

draw()

}

draw()

</script>

</body>
</html>
