<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css');

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:transparent;
font-family:'GalmuriMono', monospace;
}

.widget{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
padding:20px 28px;
background:rgba(255,255,255,0.9);
border-radius:14px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.timer{
font-size:34px;
}

.buttons{
display:flex;
gap:8px;
}

button{
font-family:'GalmuriMono', monospace;
border:none;
background:#222;
color:white;
padding:6px 14px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="widget">

<div class="timer" id="timer">25:00</div>

<div class="buttons">
<button id="toggle">Start</button>
<button id="reset">Reset</button>
</div>

</div>

<script>

const TOTAL=1500
let time=TOTAL
let running=false
let interval

const timer=document.getElementById("timer")
const toggle=document.getElementById("toggle")
const reset=document.getElementById("reset")

function draw(){
const m=String(Math.floor(time/60)).padStart(2,"0")
const s=String(time%60).padStart(2,"0")
timer.innerText=`${m}:${s}`
}

toggle.onclick=()=>{

if(!running){

interval=setInterval(()=>{
time--
localStorage.setItem("pomo",time)
draw()

if(time<=0){
clearInterval(interval)
toggle.innerText="Start"
running=false
}

},1000)

toggle.innerText="Pause"
running=true

}else{

clearInterval(interval)
toggle.innerText="Resume"
running=false

}

}

reset.onclick=()=>{

clearInterval(interval)
time=TOTAL
localStorage.setItem("pomo",TOTAL)
toggle.innerText="Start"
running=false
draw()

}

const saved=localStorage.getItem("pomo")
if(saved) time=parseInt(saved)

draw()

</script>

</body>
</html>
